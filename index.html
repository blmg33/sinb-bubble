        .month-item { padding: 5px 0; font-size: 0.75rem; color: #999; cursor: pointer; font-weight: 300; }

        .header-top { display: flex; align-items: center; height: 50px; margin-top: 5px; position: relative; }
        header h1 { position: absolute; left: 50%; transform: translateX(-50%); font-size: 1.05rem; font-weight: 700; letter-spacing: -1px; width: max-content; }
        .header-right { margin-left: auto; display: flex; gap: 15px; align-items: center; }
        .header-bottom { display: flex; justify-content: center; align-items: center; height: 20px; margin: 5px 0; gap: 4px; }

        .search-item { cursor: pointer; transition: background 0.2s; }

        .image-modal.active { display: flex; }
        .modal-content { max-width: 100%; max-height: 90%; object-fit: contain; }
        
        .static-img-container { max-width: 100px; overflow: hidden; line-height: 0; pointer-events: none; user-select: none; -webkit-user-drag: none; }
        .static-img { width: 100%; height: auto; display: block; -webkit-touch-callout: none; }
}

        .modal-close { position: absolute; top: 20px; right: 20px; color: #fff; font-size: 20px; cursor: pointer; } /* 30px -> 20px */

        .search-icon-custom::before { content: ''; position: absolute; top: 4px; left: 4px; width: 10.5px; height: 10.5px; border: 1.2px solid #333; border-radius: 50%; }

        function renderChat(month) {
            currentMonth = month; headerDate.innerText = month; chatDisplay.innerHTML = '';

                if (chat.dateText !== lastDate) {
                    chatDisplay.innerHTML += `<div class="date-divider-container"><div class="date-line"></div><p class="date-text-center">${chat.dateText}</p></div>`;
                    lastDate = chat.dateText;
                }
                const unit = document.createElement('section'); unit.className = 'message-unit'; unit.id = chat.id;
                let bubbleContent = '';
                if(chat.type === 'image') {
                    bubbleContent = `<div class="bubble-img-container" onclick="openModal('${chat.message}')"><img src="${chat.message}" class="bubble-img"></div>`;
                } else if(chat.type === 'static_image') {
        bubbleContent = `<div class="static-img-container" oncontextmenu="return false;"><img src="${chat.message}" class="static-img"></div>`;
    }
    else if(chat.type === 'live') {
                    bubbleContent = `<div class="bubble live-bubble"><div class="live-icon-container"><span class="live-icon">call</span></div><span class="live-text">${chat.message}</span></div>`;
                } else if(chat.type === 'multi') {
                    bubbleContent = `<div class="multi-bubble-container"><div class="artist-reply-bubble"><span class="artist-label">${chat.message.label}</span><span class="artist-text">${chat.message.subText}</span></div><div class="bubble followed-bubble">${chat.message.mainText}</div></div>`;
                } else {
                    bubbleContent = `<div class="bubble">${chat.message}</div>`;
                }
                unit.innerHTML = `<img src="${chat.profile}" class="profile-img"><div><span class="user-name">${chat.name}</span><div class="bubble-group">${bubbleContent}<span class="time">${chat.time}</span></div></div>`;
                chatDisplay.appendChild(unit);
            });
        }

        function toggleSearch() { document.getElementById('mainHeader').classList.toggle('search-open'); if(!document.getElementById('mainHeader').classList.contains('search-open')) renderChat(currentMonth); else searchInput.focus(); }
        function closeSearch() { document.getElementById('mainHeader').classList.remove('search-open'); searchInput.value = ''; renderChat(currentMonth); }
        
        /* [수정] 검색 기능: 특별 말풍선 구조 유지 & 대소문자 무시 */
        function handleSearch() {
            const k = searchInput.value.trim().toLowerCase();
            if (!k) { renderChat(currentMonth); return; }
            chatDisplay.innerHTML = `<p class="search-result-info">'${searchInput.value}' 검색 결과</p>`;
            let found = false;
            Object.keys(chatData).sort().forEach(m => {
                const filtered = chatData[m].filter(c => {
                    if (c.type === 'image' || c.type === 'live') return false;
                    const targetText = (c.type === 'multi' ? c.message.mainText : c.message).toLowerCase();
                    return targetText.includes(k);
                });
                if (filtered.length > 0) {
                    found = true;
                    chatDisplay.innerHTML += `<div class="date-divider-container"><div class="date-line" style="border-color:#7d67b9"></div><p class="date-text-center" style="color:#7d67b9">${m}</p></div>`;
                    filtered.forEach(chat => {
                        let originalText = (chat.type === 'multi' ? chat.message.mainText : chat.message);
                        let highlighted = originalText.replace(new RegExp(`(${k})`, "gi"), `<span class="highlight">$1</span>`);
                        
                        let bubbleContent = '';
                        if(chat.type === 'multi') {
                            // [수정] 검색 결과에서도 답장 라벨을 포함한 멀티 구조 유지
                            bubbleContent = `<div class="multi-bubble-container"><div class="artist-reply-bubble"><span class="artist-label">${chat.message.label}</span><span class="artist-text">${chat.message.subText}</span></div><div class="bubble followed-bubble">${highlighted}</div></div>`;
                        } else {
                            bubbleContent = `<div class="bubble">${highlighted}</div>`;
                        }

                        chatDisplay.innerHTML += `<section class="message-unit search-item" onclick="jumpToMessage('${m}', '${chat.id}')"><img src="${chat.profile}" class="profile-img"><div><span class="user-name">${chat.name}</span><div class="bubble-group">${bubbleContent}<span class="time">${chat.time}</span></div></div></section>`;
                    });
                }
            });
            if (!found) chatDisplay.innerHTML = `<p class="no-result">검색 결과가 없습니다.</p>`;
        }

        function jumpToMessage(m, id) {
            closeSearch(); renderChat(m);
            setTimeout(() => {
                const el = document.getElementById(id);
                if(el) { window.scrollTo({ top: el.offsetTop - 110, behavior: 'smooth' }); el.classList.add('jump-target'); setTimeout(() => el.classList.remove('jump-target'), 2000); }
            }, 100);
        }

        function renderSide() {
            sideMenu.innerHTML = '';
            const years = [2023, 2024, 2025, 2026];
            years.forEach(y => {
                let yEl = document.createElement('div'); yEl.className = 'year-item'; yEl.innerText = y;
                let c = document.createElement('div'); c.className = 'month-container';
                yEl.onclick = () => { 
                    document.querySelectorAll('.month-container').forEach(mc => mc !== c && mc.classList.remove('open'));
                    document.querySelectorAll('.year-item').forEach(yi => yi !== yEl && yi.classList.remove('active'));
                    c.classList.toggle('open'); yEl.classList.toggle('active'); 
                };
                let startM = (y === 2023) ? 4 : 1;
                let endM = (y === 2026) ? 3 : 12;
                for (let i = startM; i <= endM; i++) {
                    let mStr = `${y}/${String(i).padStart(2, '0')}`;
                    let mEl = document.createElement('div'); mEl.className = 'month-item'; mEl.innerText = mStr;
                    mEl.onclick = (e) => { e.stopPropagation(); renderChat(mStr); toggleMenu(); };
                    c.appendChild(mEl);
                }
                sideMenu.append(yEl, c);
            });
        }

        function renderPhotos() {
            const list = document.getElementById('photoList'); list.innerHTML = '';
            photoData.forEach(p => { list.innerHTML += `<div class="photo-item"><img src="${p.url}" class="photo-item-img" onclick="openModal('${p.url}')"><p class="photo-item-date">${p.date}</p></div>`; });
        }
