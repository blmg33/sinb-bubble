<!DOCTYPE html>
<html lang="ko">
<head>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..100" />
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>신비</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@100;300;400;500;700&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,0');

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Noto Sans KR', sans-serif !important; }
        body { background: #eee; color: #333; -webkit-font-smoothing: antialiased; overflow-x: hidden; scroll-behavior: smooth; }

        /* [1. 사이드 메뉴] */
        .side-menu, .photo-drawer { position: fixed; top: 0; height: 100%; background: #fff; z-index: 2000; transition: .3s; box-shadow: 0 0 10px rgba(0,0,0,0.05); padding: 40px 15px; overflow-y: auto; }
        .side-menu { left: -160px; width: 160px; text-align: right; }
        .side-menu.active { left: 0; }
        .photo-drawer { right: -280px; width: 280px; padding: 30px 20px; text-align: left; }
        .photo-drawer.active { right: 0; }
        
        .year-item { padding: 10px 0; font-size: 0.9rem; font-weight: 400; cursor: pointer; color: #bbb; }
        .year-item.active { color: #7d67b9; font-weight: 500; }
        .month-container { height: 0; overflow: hidden; opacity: 0; transition: 0.2s ease; }
        .month-container.open { height: auto; opacity: 1; padding-bottom: 10px; }
        .month-item { padding: 5px 0; font-size: 0.75rem; color: #999; cursor: pointer; font-weight: 300; }

        .drawer-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; color: #7d67b9; font-size: 0.9rem; font-weight: 600; }
        .drawer-close { font-size: 14px; cursor: pointer; color: #bbb; }
        .photo-item { margin-bottom: 25px; display: flex; flex-direction: column; align-items: flex-start; }
        .photo-item-img { width: 50px; height: 50px; border-radius: 50%; object-fit: cover; border: 1px solid #eee; margin-bottom: 10px; cursor: pointer; }
        .photo-item-date { font-size: 0.7rem; color: #999; }

        .menu-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.2); z-index: 1500; display: none; }
        .menu-overlay.active { display: block; }

        /* [2. 헤더] */
        header { position: fixed; top: 0; width: 100%; z-index: 1000; background: #fff; border-bottom: 1px solid rgba(0,0,0,0.1); border-radius: 0 0 12px 12px; box-shadow: 0 2px 6px rgba(0,0,0,0.06); }
        .header-main { height: 90px; padding: 0 15px; display: flex; flex-direction: column; position: relative; }
        .header-top { display: flex; align-items: center; height: 50px; margin-top: 5px; position: relative; }
        header h1 { position: absolute; left: 50%; transform: translateX(-50%); font-size: 1.05rem; font-weight: 700; letter-spacing: -1px; width: max-content; }
        .header-right { margin-left: auto; display: flex; gap: 15px; align-items: center; }
        .header-bottom { display: flex; justify-content: center; align-items: center; height: 20px; margin: 5px 0; gap: 4px; }
        .header-profile-img { height: 18px; object-fit: contain; }
        .header-date-text { font-size: 0.7rem; color: #000; font-weight: 700; letter-spacing: -0.5px; }
        .back-icon { font-family: 'Material Symbols Outlined' !important; font-size: 30px; font-variation-settings: 'wght' 200; cursor: pointer; margin-left: -5px; }

        /* [3. 검색창] */
        .search-bar-container { position: absolute; top: 90px; left: 0; width: 100%; height: 0; background: #fafafa; overflow: hidden; transition: 0.2s ease; display: flex; align-items: center; padding: 0 20px; }
        header.search-open .search-bar-container { height: 40px; border-bottom: 1px solid rgba(0,0,0,0.05); }
        .search-input { flex: 1; border: none; background: transparent; font-size: 0.75rem; outline: none; }

        /* [4. 채팅창 & 말풍선] */
        .chat-container { padding: 100px 15px 30px; max-width: 500px; margin: 0 auto; display: flex; flex-direction: column; gap: 17px; }
        header.search-open ~ .chat-container { padding-top: 140px; }
        .date-divider-container { text-align: center; margin: 0 0 10px; }
        .date-line { border-bottom: 1px solid rgba(0,0,0,0.08); margin-bottom: 4px; }
        .date-text-center { color: #999; font-size: 0.65rem; }

        .message-unit { display: flex; margin-left: -5px; gap: 5px; }
        .profile-img { width: 35px; height: 35px; border-radius: 50%; object-fit: cover; background: #ddd; }
        .user-name { font-size: 0.68rem; color: #222; font-weight: 400; margin-bottom: 3px; display: block; opacity: 0.9; }
        .bubble-group { display: flex; align-items: flex-end; gap: 5px; }
        
        .bubble { padding: 8px 11px; background: #fff; border-radius: 4px 13px 13px 13px; font-size: 0.82rem; line-height: 1.4; color: #222; white-space: pre-line; box-shadow: none; width: fit-content; border: 1px solid #eee; } 
        
        /* 1. 컨테이너: 최대 너비를 제한합니다 (화면의 약 75~80%) */
.multi-bubble-container { 
    display: flex; 
    flex-direction: column; 
    gap: 3px; 
    align-items: flex-start; 
    max-width: 260px; /* 🚩 이 줄이 추가되었습니다. 말풍선이 멈추는 지점입니다. */
} 

/* 2. 라벨 박스: 디자인 유지 */
.artist-reply-bubble { 
    padding: 10px 10px; 
    background: #fff; 
    border-radius: 12px; 
    box-shadow: none; 
    width: fit-content; 
    border: 1px solid #eee; 
    box-sizing: border-box; /* 패딩이 너비에 영향을 주지 않도록 추가 */
} 

/* 3. 상단 라벨 텍스트: 디자인 유지 */
.artist-label { 
    font-size: 0.6rem; 
    font-weight: 700; 
    color: #222; 
    display: block; 
    margin-bottom: 2px; 
    opacity: 0.8; 
} 

/* 4. 🚩 핵심 수정: 줄바꿈을 허용하고 긴 글자를 아래로 보냅니다 */
.artist-text { 
    font-size: 0.65rem; 
    font-weight: 300; 
    color: #777; 
    display: block; 
    line-height: 1.3; /* 가독성을 위해 살짝 높임 */
    
    /* 기존 white-space: nowrap; 을 삭제하고 아래 속성들을 넣었습니다 */
    white-space: normal;    /* 줄바꿈 허용 */
    word-break: break-all;  /* 단어가 길어도 상자 밖으로 안 나가게 함 */
    overflow-wrap: break-word; 
}
        
        
        .followed-bubble { border-radius: 4px 13px 13px 13px; width: fit-content; }
        .live-bubble { display: flex; align-items: center; gap: 7px; padding: 8px 11px; border: 1px solid #eee; box-shadow: none; } 
        .live-icon-container { width: 18px; height: 18px; border-radius: 50%; border: 1px solid #ddd; display: flex; align-items: center; justify-content: center; }
        .live-icon { font-family: 'Material Symbols Outlined' !important; font-size: 12px; color: #000; font-variation-settings: 'FILL' 1, 'wght' 700; }
        .live-text { font-size: 0.82rem; transform: translateY(0.5px); }
        
        .bubble-img-container { cursor: pointer; max-width: 200px; border-radius: 4px 13px 13px 13px; overflow: hidden; border: 1px solid #ddd; line-height: 0; box-shadow: none; } 
        .bubble-img { width: 100%; height: auto; }

        .time { font-size: 0.6rem; color: #aaa; margin-bottom: 2px; min-width: 35px; }

        .search-result-info { font-size: 0.7rem; color: #7d67b9; text-align: center; margin: 8px 0 10px; width: 100%; font-weight: 500; }
        .no-result { text-align: center; color: #ccc; padding: 50px 0; font-size: 0.7rem; width: 100%; }
        .highlight { background-color: #7d67b9; color: white; padding: 0; border-radius: 0; }
        .search-item { cursor: pointer; transition: background 0.2s; }
        
        /* 동영상 말풍선 컨테이너 */
       .bubble-video-container { position: relative; display: inline-block; /* 내용물 크기에 맞게 */ max-width: 200px; border-radius: 2px 15px 15px 15px; /* 버블 특유의 모양 */
                                 overflow: hidden; background-color: #000; line-height: 0;cursor: pointer;}

        /* 썸네일 이미지/비디오 스타일 */
       .bubble-video-container video, 
       .bubble-video-container .bubble-img {width: 100%;height: auto;display: block;object-fit: cover;}

        .video-play-icon { 
    position: absolute; 
    top: 50%; 
    left: 50%; 
    transform: translate(-50%, -50%);
    
    display: flex;
    align-items: center;
    justify-content: center;

    /* 폰트 설정 */
    font-family: 'Material Symbols Outlined' !important; 
    
    /* 굵기 고정 */
    font-weight: 100 !important; 
    
    /* 🚩 [수정] 둥글기(ROUND) 속성 키워드 강화 및 채우기(FILL) 해제 */
    /* ROUND 100이 모서리를 아주 둥글게 만듭니다 */
    font-variation-settings: 'FILL' 0, 'wght' 100, 'grad' 0, 'opsz' 24, 'ROUND' 400 !important; 
    
    /* 아이콘 크기 (삼각형이 너무 커서 원 밖으로 나가지 않게 28~30px 추천) */
    font-size: 40px; 
    color: rgba(255, 255, 255, 0.7);
    
    /* 배경 원 (기존 유지) */
    background-color: rgba(0, 0, 0, 0.3);
    width: 40px;
    height: 40px;
    border-radius: 50%;
    
    pointer-events: none; 
    z-index: 10;
}

/* 🚩 [추가] 재생 아이콘 밑에 뜰 영상 길이(Duration) 스타일 */
.video-duration {
    position: absolute;
    bottom: 5px;   /* 말풍선 아래에서 5px 위 */
    right: 7px;    /* 말풍선 오른쪽에서 7px 왼쪽 */
    background-color: rgba(0, 0, 0, 0.5); /* 투명한 검은 배경 */
    color: rgba(255, 255, 255, 0.9); /* 살짝 투명한 흰색 글씨 */
    font-size: 10px; /* 아주 작게 */
    padding: 1px 4px; /* 글자 주변 여백 */
    border-radius: 3px; /* 살짝 둥글게 */
    font-family: sans-serif; /* 깔끔한 고딕체 */
    z-index: 11; /* 아이콘보다 위에 */
    pointer-events: none; /* 클릭 방해 안 함 */
}

.bubble-video-container {
    background-color: #000; /* 영상 로딩 전 검은색 배경 */
}
        
        /* [복구] 이미지 모달창: 화면 정중앙 정렬 및 배경 설정 */
.image-modal { 
    position: fixed; 
    inset: 0; 
    background: rgba(0, 0, 0, 0.9); /* 검은색 배경 */
    z-index: 3000; 
    display: none; /* 기본은 숨김 */
    align-items: center;    /* 세로 중앙 */
    justify-content: center; /* 가로 중앙 */
    padding: 20px; 
}

/* 이미지를 정중앙에 띄우는 핵심 클래스 */
.image-modal.active { 
    display: flex; 
}

/* 사진 크기 조절 */
.modal-content { 
    max-width: 95%; 
    max-height: 85%; 
    object-fit: contain; 
    box-shadow: 0 0 20px rgba(0,0,0,0.5);
}

/* [복구] 오른쪽 위 X 버튼 스타일 */
.modal-close { 
    position: absolute; 
    top: 30px; 
    right: 25px; 
    color: #ffffff; /* 흰색으로 확실히 보이게 */
    font-size: 20px; 
    font-weight: bold;
    cursor: pointer; 
    text-shadow: 0 0 10px rgba(0,0,0,0.8); /* 배경이 밝아도 보이게 그림자 추가 */
    z-index: 3001; /* 사진보다 위에 표시 */
}
        
        .static-img-container { max-width: 100px; overflow: hidden; line-height: 0; pointer-events: none; user-select: none; -webkit-user-drag: none; }
        .static-img { width: 100%; height: auto; display: block; -webkit-touch-callout: none; }
}
        
        /* [🚩 핵심 수정 부분] X 버튼 크기 축소 */
        .modal-close { position: absolute; top: 20px; right: 20px; color: #fff; font-size: 20px; cursor: pointer; } /* 30px -> 20px */
        
        .search-icon-custom { position: relative; width: 24px; height: 24px; cursor: pointer; }
        .search-icon-custom::before { content: ''; position: absolute; top: 4px; left: 4px; width: 10.5px; height: 10.5px; border: 1.2px solid #333; border-radius: 50%; }
        .search-icon-custom::after { content: ''; position: absolute; bottom: 4px; right: 4px; width: 8px; height: 1.2px; background-color: #333; transform: rotate(45deg); transform-origin: bottom right; }
        .two-dots-icon { position: relative; width: 20px; height: 20px; display: flex; flex-direction: column; justify-content: space-between; padding: 4px 9px; cursor: pointer; }
        .two-dots-icon::before, .two-dots-icon::after { content: ''; width: 2.5px; height: 2.5px; background: #333; border-radius: 50%; }
        
        @keyframes flash { 0% { background: #7d67b933; } 100% { background: #fff; } }
        .jump-target .bubble, .jump-target .live-bubble, .jump-target .bubble-img-container, .jump-target .artist-reply-bubble { animation: flash 1.5s ease-out; }
        
        /* 우측 역대 프사 리스트 전용 스타일 */
.profile-history-container {
    padding: 20px 15px;
    border-top: 1px solid #f0f0f0;
    margin-top: 20px;
}
.history-title {
    font-size: 0.75rem;
    font-weight: 800;
    margin-bottom: 15px;
    color: #888;
    text-transform: uppercase;
    letter-spacing: 1px;
}
.history-list {
    display: flex;
    flex-direction: column; /* 세로 나열 */
    gap: 12px;
    align-items: center;
}
.history-item {
    width: 55px;
    height: 55px;
    border-radius: 22px; /* 버블 특유의 부드러운 사각형 */
    object-fit: cover;
    border: 1.5px solid #fff;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    transition: all 0.2s ease;
    cursor: pointer;
}
.history-item:hover {
    transform: translateY(-3px) scale(1.05);
    box-shadow: 0 5px 15px rgba(0,0,0,0.15);
}
    </style>
</head>

        const photoData = [{ date: "2023 / 04 / 19", url: "https://uploads.onecompiler.io/44gssj43k/44gt92s48/230417.jpg" },
        { date: "2023 / 08 / 12", url: "https://uploads.onecompiler.io/44gssj43k/44gt92s48/230812.jpg" },
        { date: "2023 / 08 / 12", url: "https://uploads.onecompiler.io/44gssj43k/44gt92s48/230812p-2.jpg" },
        { date: "2023 / 10 / 07", url: "https://uploads.onecompiler.io/44gssj43k/44gt92s48/231007p.jpg" },
        { date: "2024 / 11 / 21", url: "https://uploads.onecompiler.io/44gssj43k/44gt92s48/241121p.jpg" },
        {date: "2025 / 07 / 00", url: "https://uploads.onecompiler.io/44gssj43k/44gt92s48/250700.jpg"}];
        
        let currentMonth = "2023/04";

        const overlay = document.getElementById('overlay'), sideMenu = document.getElementById('sideMenu'), photoDrawer = document.getElementById('photoDrawer'), chatDisplay = document.getElementById('chatDisplay'), headerDate = document.getElementById('headerDateDisplay'), searchInput = document.getElementById('searchInput');

        const toggleMenu = () => [sideMenu, overlay].forEach(el => el.classList.toggle('active'));
        const togglePhotoDrawer = () => [photoDrawer, overlay].forEach(el => el.classList.toggle('active'));
        overlay.onclick = () => [sideMenu, photoDrawer, overlay].forEach(el => el.classList.remove('active'));

        function openModal(url) { document.getElementById('modalImg').src = url; document.getElementById('imageModal').classList.add('active'); }

        /* [추가] 동영상 모달창 실행 함수 */
function openVideoModal(videoUrl) {
    const modal = document.getElementById('imageModal'); // 기존 이미지 모달창 재사용
    const modalImg = document.getElementById('modalImg');
    
    // 1. 기존 이미지는 잠시 숨깁니다.
    if (modalImg) modalImg.style.display = 'none';
    
    // 2. 혹시 이전에 열었던 비디오가 남아있다면 지웁니다.
    const oldVideo = modal.querySelector('video');
    if (oldVideo) oldVideo.remove();

    // 3. 새로운 비디오 태그를 만듭니다.
    const videoTag = document.createElement('video');
    videoTag.src = videoUrl;
    videoTag.className = 'modal-content'; // 이미지와 같은 중앙 정렬 스타일 사용
    videoTag.controls = true;    // 재생, 볼륨, 전체화면 버튼 표시
    videoTag.autoplay = true;    // 열자마자 바로 재생
    videoTag.style.display = 'block';

    // 4. 모달창에 비디오를 넣고 화면을 띄웁니다.
    modal.appendChild(videoTag);
    modal.classList.add('active');

    // 5. [중요] 모달창을 닫을 때 비디오를 정지하고 삭제하는 설정
    modal.onclick = function() {
        modal.classList.remove('active');
        videoTag.pause();  // 소리 끄기
        videoTag.remove(); // 비디오 태그 제거
        if (modalImg) modalImg.style.display = 'block'; // 다음 사진 클릭을 위해 이미지 태그 복구
    };
}

        function renderChat(month) {
            currentMonth = month; headerDate.innerText = month; chatDisplay.innerHTML = '';
            let lastDate = "";
            (chatData[month] || []).forEach(chat => {
                if (chat.dateText !== lastDate) {
                    chatDisplay.innerHTML += `<div class="date-divider-container"><div class="date-line"></div><p class="date-text-center">${chat.dateText}</p></div>`;
                    lastDate = chat.dateText;
                }
                const unit = document.createElement('section'); unit.className = 'message-unit'; unit.id = chat.id;
                // renderChat 함수 안의 기존 if/else if 블록을 이 내용으로 교체하세요.

                let bubbleContent = '';
                
                // 1. 일반 이미지 (클릭 시 모달창 열림)
                if(chat.type === 'image') {
                    bubbleContent = `<div class="bubble-img-container" onclick="openModal('${chat.message}')"><img src="${chat.message}" class="bubble-img"></div>`;
                } 
                
                // 2. 정적 이미지 (클릭/다운로드 불가)
                else if(chat.type === 'static_image') {
                    bubbleContent = `<div class="static-img-container" oncontextmenu="return false;"><img src="${chat.message}" class="static-img"></div>`;
                } 
                
                // 3. 보이스/라이브 말풍선
                else if(chat.type === 'live') {
                    bubbleContent = `<div class="bubble live-bubble"><div class="live-icon-container"><span class="live-icon">call</span></div><span class="live-text">${chat.message}</span></div>`;
                } 
                
                // 4. 아티스트 답장형(멀티) 말풍선
                else if(chat.type === 'multi') {
                    bubbleContent = `<div class="multi-bubble-container"><div class="artist-reply-bubble"><span class="artist-label">${chat.message.label}</span><span class="artist-text">${chat.message.subText}</span></div><div class="bubble followed-bubble">${chat.message.mainText}</div></div>`;
                } 
                
                // renderChat 함수 내부의 video 타입 처리 부분
else if(chat.type === 'video') {
    // 영상 주소 뒤에 #t=0.1을 붙여서 첫 화면을 미리보기로 만듭니다.
    const videoPoster = chat.message + "#t=0.1";
    
    bubbleContent = `
        <div class="bubble-video-container" onclick="openVideoModal('${chat.message}')">
            <video class="bubble-img" preload="metadata">
                <source src="${videoPoster}" type="video/mp4">
            </video>
            <span class="video-play-icon">play_arrow</span>
        </div>`;
}
                
                // 5. 일반 텍스트 말풍선
                else {
                    bubbleContent = `<div class="bubble">${chat.message}</div>`;
                }
                unit.innerHTML = `<img src="${chat.profile}" class="profile-img"><div><span class="user-name">${chat.name}</span><div class="bubble-group">${bubbleContent}<span class="time">${chat.time}</span></div></div>`;
                chatDisplay.appendChild(unit);
            });
        }

        function toggleSearch() { document.getElementById('mainHeader').classList.toggle('search-open'); if(!document.getElementById('mainHeader').classList.contains('search-open')) renderChat(currentMonth); else searchInput.focus(); }
        function closeSearch() { document.getElementById('mainHeader').classList.remove('search-open'); searchInput.value = ''; renderChat(currentMonth); }
        
        function handleSearch() {
    const k = searchInput.value.trim().toLowerCase();
    if (!k) { renderChat(currentMonth); return; }
    chatDisplay.innerHTML = `<p class="search-result-info">'${searchInput.value}' 검색 결과</p>`;
    let found = false;
    Object.keys(chatData).sort().forEach(m => {
        const filtered = chatData[m].filter(c => {
            // 🚩 [수정] 사진, 라이브, 영상, 외부영상, 그리고 '정적 이미지(static_image)'까지 모두 검색에서 제외
            if (c.type === 'image' || c.type === 'live' || c.type === 'video' || c.type === 'iframe_video' || c.type === 'static_image') return false;
            
            const targetText = (c.type === 'multi' ? c.message.mainText : c.message).toLowerCase();
            return targetText.includes(k);
        });
        if (filtered.length > 0) {
            found = true;
            chatDisplay.innerHTML += `<div class="date-divider-container"><div class="date-line" style="border-color:#7d67b9"></div><p class="date-text-center" style="color:#7d67b9">${m}</p></div>`;
            filtered.forEach(chat => {
                let originalText = (chat.type === 'multi' ? chat.message.mainText : chat.message);
                let highlighted = originalText.replace(new RegExp(`(${k})`, "gi"), `<span class="highlight">$1</span>`);
                
                let bubbleContent = '';
                if(chat.type === 'multi') {
                    bubbleContent = `<div class="multi-bubble-container"><div class="artist-reply-bubble"><span class="artist-label">${chat.message.label}</span><span class="artist-text">${chat.message.subText}</span></div><div class="bubble followed-bubble">${highlighted}</div></div>`;
                } else {
                    bubbleContent = `<div class="bubble">${highlighted}</div>`;
                }

                chatDisplay.innerHTML += `<section class="message-unit search-item" onclick="jumpToMessage('${m}', '${chat.id}')"><img src="${chat.profile}" class="profile-img"><div><span class="user-name">${chat.name}</span><div class="bubble-group">${bubbleContent}<span class="time">${chat.time}</span></div></div></section>`;
            });
        }
    });
    if (!found) chatDisplay.innerHTML = `<p class="no-result">검색 결과가 없습니다.</p>`;
}

        function jumpToMessage(m, id) {
            closeSearch(); renderChat(m);
            setTimeout(() => {
                const el = document.getElementById(id);
                if(el) { window.scrollTo({ top: el.offsetTop - 110, behavior: 'smooth' }); el.classList.add('jump-target'); setTimeout(() => el.classList.remove('jump-target'), 2000); }
            }, 100);
        }

        function renderSide() {
            sideMenu.innerHTML = '';
            const years = [2023, 2024, 2025, 2026];
            years.forEach(y => {
                let yEl = document.createElement('div'); yEl.className = 'year-item'; yEl.innerText = y;
                let c = document.createElement('div'); c.className = 'month-container';
                yEl.onclick = () => { 
                    document.querySelectorAll('.month-container').forEach(mc => mc !== c && mc.classList.remove('open'));
                    document.querySelectorAll('.year-item').forEach(yi => yi !== yEl && yi.classList.remove('active'));
                    c.classList.toggle('open'); yEl.classList.toggle('active'); 
                };
                let startM = (y === 2023) ? 4 : 1;
                let endM = (y === 2026) ? 3 : 12;
                for (let i = startM; i <= endM; i++) {
                    let mStr = `${y}/${String(i).padStart(2, '0')}`;
                    let mEl = document.createElement('div'); mEl.className = 'month-item'; mEl.innerText = mStr;
                    mEl.onclick = (e) => { e.stopPropagation(); renderChat(mStr); toggleMenu(); };
                    c.appendChild(mEl);
                }
                sideMenu.append(yEl, c);
            });
        }

        function renderPhotos() {
    const list = document.getElementById('photoList');
    if (!list) return;
    
    // 1. 기존 리스트를 깨끗하게 비웁니다.
    list.innerHTML = '';
    
    // 2. 오직 위에서 설정한 photoData에 있는 3개만 화면에 그립니다.
    photoData.forEach(p => { 
        list.innerHTML += `
            <div class="photo-item">
                <img src="${p.url}" class="photo-item-img" onclick="openModal('${p.url}')">
                <p class="photo-item-date">${p.date}</p>
            </div>`;
    });
}

        renderChat("2023/04"); renderSide(); renderPhotos();
        

    </script>
    
    <div class="image-modal" id="imageModal" onclick="this.classList.remove('active')">
    <span class="modal-close">✕</span>
    <img class="modal-content" id="modalImg">
</div>
